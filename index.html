<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Air Fry AI</title>
</head>
<body>
    <div class="header">
        <div class="main-title">
            <img src="img/airfry_ai_logo.png">
            <h3>AirFry.ai</h3>
        </div>
        <div class="small-title">
            <h2>Fry smarter.</h2>
        </div>
    </div>

    <!--- This is switch where you choose between time/temp or recipes --->
    
    <div class="background">
        <div class="switch">
            <h2>Time & Temp</h2>
            <h2>Recipes</h2>
        </div>
    </div>

    <!---Time and Temperature Instructions --->

    <div class="time-temp-instructions">
        <h2>What's cooking?</h2>
        <div class="time-timp-input">
            <input type="text" name="food" placeholder="Chicken, ribs, etc...">
        </div>
        <div class="temperature">
            <input type="radio" id="celsius" name="temperature" value="C">
            <label for="celsius">°C</label>
            <input type="radio" id="fahrenheit" name="temperature" value="F">
            <label for="fahrenheit">°F</label>
        </div>
        <div class="airfry-button">
            <button>Air Fry</button>
        </div>
    </div>

    <!---Recipe Instructions --->

    <div class="time-temp-instructions">
        <h2>Give Me a Recipe For...</h2>
        <div class="recipe-input">
            <input type="text" name="food" placeholder="Chicken, ribs, etc...">
        </div>
        <div class="temperature">
            <input type="radio" id="celsius" name="temperature" value="C">
            <label for="celsius">°C</label>
            <input type="radio" id="fahrenheit" name="temperature" value="F">
            <label for="fahrenheit">°F</label>
        </div>
        <div class="airfry-button">
            <button>Create Recipe</button>
        </div>
    </div>

    <!----What Others Are Cooking Fed --->

    <div class="cooking-feed">
        <h1>What Others Are Cooking...</h1>
        
    </div>



    
</body>
</html>
