<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <title>Air Fry AI</title>
</head>
<body>
    <div class="header">
        <div class="main-title">
            <div class="logo-image">
                <img src="img/airfry_ai_logo.png">
            </div>
            <h1>AirFry.<span>ai</span></h1>
        </div>
        <div class="small-title">
            <h2>Fry smarter.</h2>
        </div>
    </div>

    <!--- This is switch where you choose between time/temp or recipes --->
    
    <div class="background">
        <div class="switch">
            <label for="switch">Choose:</label>
            <select id="switch" name="switch">
                <option value="time-temp">Time & Temp</option>
                <option value="recipes">Recipes</option>
            </select>
        </div>
    
    <!---Time and Temperature Instructions --->

        <div class="time-temp-instructions">
            <h2>What's cooking?</h2>
            <div class="time-timp-input">
                <input type="text" name="food" placeholder="Chicken, ribs, etc...">
            </div>
            <div class="temperature">
                <input type="radio" id="celsius" name="temperature" value="C">
                <label for="celsius">°C</label>
                <input type="radio" id="fahrenheit" name="temperature" value="F">
                <label for="fahrenheit">°F</label>
            </div>
            <div class="airfry-button">
                <button>Air Fry</button>
            </div>
        </div>

        <!---Recipe Instructions --->

        <div class="recipe-instructions">
            <h2>Give Me a Recipe For...</h2>
            <div class="recipe-input">
                <input type="text" name="food" placeholder="Chicken, ribs, etc...">
            </div>
            <div class="temperature">
                <input type="radio" id="celsius" name="temperature" value="C">
                <label for="celsius">°C</label>
                <input type="radio" id="fahrenheit" name="temperature" value="F">
                <label for="fahrenheit">°F</label>
            </div>
            <div class="airfry-button">
                <button>Create Recipe</button>
            </div>
        </div>
    </div>

 <!----What Others Are Cooking Fed --->

 <div class="cooking-feed">
    <h1>What Others Are Cooking...</h1>
    
</div>

    
</body>
</html>
